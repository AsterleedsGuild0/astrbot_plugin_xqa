name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark this release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML ruff

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate metadata version
        shell: bash
        run: |
          METADATA_VERSION="$(python - <<'PY'
          import yaml

          with open('metadata.yaml', 'r', encoding='utf-8') as f:
              print(yaml.safe_load(f)['version'])
          PY
          )"

          if [[ "$METADATA_VERSION" != "${{ steps.version.outputs.version }}" ]]; then
            echo "metadata.yaml version ($METADATA_VERSION) does not match release version (${{ steps.version.outputs.version }})" >&2
            exit 1
          fi

      - name: Extract release notes
        run: >-
          python scripts/generate_changelog.py extract
          "${{ steps.version.outputs.version }}"
          --output release-notes.md

      - name: Lint packaging script
        run: python -m ruff check scripts/package_plugin.py scripts/generate_changelog.py

      - name: Build plugin package
        run: python scripts/package_plugin.py --package-version "${{ steps.version.outputs.version }}"

      - name: Resolve package path
        id: package
        shell: bash
        run: |
          PACKAGE_PATH="dist/astrbot_plugin_xqa-${{ steps.version.outputs.version }}.zip"
          test -f "$PACKAGE_PATH"
          echo "path=$PACKAGE_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: astrbot_plugin_xqa-${{ steps.version.outputs.version }}
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: astrbot_plugin_xqa ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: ${{ steps.package.outputs.path }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || contains(steps.version.outputs.version, '-') }}
